version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casadavo-backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/app/data/casadavo.db
      - PORT=8080
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: casadavo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
