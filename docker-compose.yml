version: "3.9"

services:

  backend:
    image: pokkew/casadavo-backend:latest
    container_name: casadavo-backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/app/data/casadavo.db
      - PORT=8080
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: casadavo-sqlite-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - sqlite_data:/data
    command: ["-H", "0.0.0.0", "-p", "8080", "-x", "/data/casadavo.db"]
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    image: pokkew/casadavo-frontend:latest
    container_name: casadavo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
